name: CDD Constitutional Guardrails
# 宪法门禁：自动化执行 CDD 核心公理 (§102.3, Tier 3, Entropy Law)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发审计

jobs:
  judiciary-audit:
    name: 🏛️ Judiciary Audit (Tier 1-3)
    runs-on: ubuntu-latest
    
    steps:
    # 1. 现场勘查 (Initialize)
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # 缓存优化 (基于哈希)
    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Legal Tools
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml
        # 如果存在 requirements.txt 则安装，否则跳过
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 2. 门禁一：版本一致性 (Gate 1: Consistency)
    # 依据: §102.3 宪法同步公理
    # 失败后果: 拒绝合并 (Non-negotiable)
    - name: 🛡️ Gate 1 - Enforce Version Consistency
      run: |
        echo "Running Verification Protocol §102.3..."
        python scripts/verify_versions.py --verbose

    # 3. 门禁二：行为合规性 (Gate 2: Behavior)
    # 依据: Tier 3 行为验证标准
    # 失败后果: 拒绝合并 (Functional Regression)
    - name: ⚖️ Gate 2 - Verify System Behavior
      run: |
        echo "Running Judicial Tests (Tier 3)..."
        pytest --verbose

    # 4. 门禁三：熵值监控 (Gate 3: Entropy)
    # 依据: 系统热力学定律 (System Entropy Law)
    # 失败后果: 如果 H_sys > 0.5 (Warning/Danger)，构建失败
    - name: 📉 Gate 3 - Measure System Entropy
      run: |
        echo "Calculating System Entropy (H_sys)..."
        # 使用 OR 逻辑捕获退出码，确保输出自定义错误信息后退出
        python scripts/measure_entropy.py || (echo "❌ System entropy exceeds dangerous threshold (H_sys > 0.5)" && exit 1)