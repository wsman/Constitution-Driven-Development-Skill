# CDD Configuration v1.3.0

# Audit & Governance Settings

project:
  name: "{{PROJECT_NAME}}"
  version: "0.1.0"
  entropy_threshold: 0.3  # H_sys target

# 外部审计配置

audit:
  provider: "deepseek-reasoner"
  api_config:
    base_url: "https://api.deepseek.com/chat/completions"
    timeout: 120
  trigger_policy:
    on_state_change: ["State E"]  # State E 结束时自动触发
    on_file_change: ["memory_bank/01_active_state/*.md"]
  reporting:
    format: "markdown"
    output_dir: "reports/audits"
    notify_channels: ["console"]

# 上下文管理配置 (DS-007 实现)

context_strategy:
  max_tokens: 8000
  safety_margin: 0.1 # 保留 10% 缓冲
  modes:
    planning:
      include: ["systemPatterns.md", "techContext.md"]
      budget_ratio: 0.5
    coding:
      include: ["DS-050", "DS-051", "DS-052"]
      exclude: ["README.md", "history_logs"]
      budget_ratio: 0.7
    verifying:
      include: ["behaviorContext.md"]
      budget_ratio: 0.6

# 路径配置

paths:
  memory_bank: "memory_bank"
  templates: "templates"
  specs: "specs"
  src: "src"
