# CDD Configuration v1.3.2
# Final Polish

project:
  name: "{{PROJECT_NAME}}"
  version: "0.1.0"
  entropy_threshold: 0.3

# 外部审计配置
external_auditor:
  enabled: true
  provider: "deepseek-reasoner"
  max_tokens: 8192
  api:
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
  trigger_policy:
    on_state_change: ["State E"]
    on_file_change: ["memory_bank/core/active_context.md"]
  reporting:
    format: "markdown"
    output_dir: "research_report"

# Spec-Kit 集成配置 (v1.3.2 Updated)
spec_kit:
  templates:
    spec: "templates/standards/DS-050_feature_specification.md"
    plan: "templates/standards/DS-051_implementation_plan.md"
    tasks: "templates/standards/DS-052_atomic_tasks.md"
  output:
    specs_dir: "specs"
    plans_dir: "plans"

# 上下文管理 (DS-007)
context_strategy:
  max_tokens: 8000
  safety_margin: 0.1
  modes:
    planning:
      include: ["templates/axioms/system_patterns.md", "templates/axioms/tech_context.md"]
      budget_ratio: 0.5
    coding:
      include: ["templates/standards/DS-050", "templates/standards/DS-051", "templates/standards/DS-052"]
      budget_ratio: 0.7
    verifying:
      include: ["templates/axioms/behavior_context.md"]
      budget_ratio: 0.6

# 路径配置 (v1.3.2 Final Polish)
paths:
  templates:
    core: "templates/core"
    axioms: "templates/axioms"
    standards: "templates/standards"
    protocols: "templates/protocols"
