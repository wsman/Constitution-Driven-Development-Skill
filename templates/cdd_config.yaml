# CDD Configuration v1.4.0
# Quality & Governance Integration

project:
  name: "{{PROJECT_NAME}}"
  version: "0.1.0"
  entropy_threshold: 0.3

# 外部审计配置
external_auditor:
  enabled: true
  provider: "deepseek-reasoner"
  max_tokens: 8192
  api:
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
  trigger_policy:
    on_state_change: ["State E"]
    on_file_change: ["memory_bank/core/active_context.md"]
  reporting:
    format: "markdown"
    output_dir: "research_report"

# Spec-Kit 集成配置 (v1.4.0 Updated)
spec_kit:
  templates:
    spec: "templates/standards/DS-050_feature_specification.md"
    plan: "templates/standards/DS-051_implementation_plan.md"
    tasks: "templates/standards/DS-052_atomic_tasks.md"
    quality_checklist: "templates/standards/DS-053_quality_checklist.md"
    environment_hardening: "templates/standards/DS-054_environment_hardening.md"
  output:
    specs_dir: "specs"
    plans_dir: "plans"
    checklists_dir: "memory_bank/checklists"

# 质量门禁配置 (v1.4.0)
quality_gates:
  analyze:
    enabled: true
    mandatory: true
    trigger: "after DS-052 generation"
    output: "memory_bank/protocols/analysis_report.md"
  checklist:
    enabled: true
    mandatory: false
    trigger: "after Analyze pass"
    output_dir: "memory_bank/checklists"
  environment_hardening:
    enabled: true
    mandatory: true
    trigger: "before State C execution"
    skip_patterns:
      - "*.docs"
      - "*.refactor"

# 上下文管理 (DS-007)
context_strategy:
  max_tokens: 8000
  safety_margin: 0.1
  modes:
    planning:
      include: ["templates/axioms/system_patterns.md", "templates/axioms/tech_context.md"]
      budget_ratio: 0.5
    coding:
      include: ["templates/standards/DS-050_feature_specification.md", "templates/standards/DS-051_implementation_plan.md", "templates/standards/DS-052_atomic_tasks.md"]
      budget_ratio: 0.7
    verifying:
      include: ["templates/axioms/behavior_context.md"]
      budget_ratio: 0.6

# 路径配置 (v1.4.0)
paths:
  templates:
    core: "templates/core"
    axioms: "templates/axioms"
    standards: "templates/standards"
    protocols: "templates/protocols"
